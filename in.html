<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvet Moon & Silver Sun</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body, html {
    height: 100%;
    width: 100%;
    background: #050507;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: none;
}

/* Flashlight */
#flashlight {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(circle 120px at 0% 0%, rgba(255, 133, 161, 0.2) 0%, rgba(5, 5, 7, 1) 100%);
    z-index: 100;
    pointer-events: none;
}

/* Content */
#content-layer {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.memory-node {
    position: absolute;
    color: rgba(255, 255, 255, 0.8);
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.2;
    transition: opacity 0.3s;
}

#the-sun {
    width: 100px; height: 100px;
    background: radial-gradient(circle, #fff 0%, #e2e8f0 50%, transparent 100%);
    border-radius: 50%;
    filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

/* Reveal */
#reveal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(10, 10, 15, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 200;
    cursor: auto;
}

.letter {
    max-width: 450px;
    width: 90%;
    padding: 40px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 133, 161, 0.3);
    border-radius: 30px;
    backdrop-filter: blur(20px);
    text-align: left;
}

h1 {
    font-family: 'Playfair Display';
    color: #ff85a1;
    margin-bottom: 20px;
    font-size: 1.8rem;
}

p {
    line-height: 1.7;
    color: #ddd;
    margin-bottom: 15px;
    font-size: 0.95rem;
}

.highlight { color: #ff85a1; font-weight: 600; }

.footer {
    text-align: center;
    margin-top: 25px;
    font-size: 0.8rem;
    opacity: 0.5;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 15px;
}

#hint {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: #444;
    font-size: 0.8rem;
    z-index: 150;
}
</style>
</head>

<body>

<div id="flashlight"></div>
<div id="hint">Move the Moon... (Tap anywhere for music 🎵)</div>

<div id="content-layer">
    <div class="memory-node" style="top: 20%; left: 20%;">🤡</div>
    <div class="memory-node" style="top: 60%; left: 80%;">🤺</div>
    <div class="memory-node" style="top: 10%; left: 70%;">🛡️</div>
    <div class="memory-node" style="top: 80%; left: 30%;">📢</div>
    <div id="the-sun" onclick="revealLetter()"></div>
</div>

<div id="reveal-overlay">
    <div class="letter">
        <h1>Happy Anniversary ❤️</h1>
        <p>This moment is ours. Always.</p>
    </div>
</div>

<!-- 🎵 MUSIC -->
<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
const flashlight = document.getElementById('flashlight');

// Flashlight movement
window.addEventListener('mousemove', e => {
    updateFlashlight(e.clientX, e.clientY);
});

window.addEventListener('touchmove', e => {
    updateFlashlight(e.touches[0].clientX, e.touches[0].clientY);
});

function updateFlashlight(x, y) {
    flashlight.style.background =
    `radial-gradient(circle 120px at ${x}px ${y}px, rgba(255,133,161,0.25) 0%, rgba(5,5,7,1) 100%)`;
}

// 🎵 Start music on first interaction (GitHub fix)
document.addEventListener("click", () => {
    const music = document.getElementById("bg-music");
    music.volume = 0.4;
    if (music.paused) {
        music.play().catch(() => {});
    }
}, { once: true });

// Reveal
function revealLetter() {
    document.getElementById('reveal-overlay').style.display = 'flex';
    document.body.style.cursor = 'auto';

    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#ff85a1', '#ffffff', '#e2e8f0']
    });
}
</script>

</body>
</html>
